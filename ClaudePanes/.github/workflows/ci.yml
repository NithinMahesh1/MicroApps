name: CI

# Run on pushes to main and on all pull requests
on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only needs to read the repository contents.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Test matrix: every supported Python on every supported OS
  test:
    name: Test (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Run all cells even if one fails so we see the full picture
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Stdlib-only project: no install step, no requirements.txt
      - name: Run unittest discovery
        run: python -m unittest discover tests -v

  # Lint runs once on Ubuntu with the latest stable Python.
  # Non-blocking for now (continue-on-error) until the codebase is fully ruff-clean.
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # ruff is a dev-only tool; install ad hoc rather than committing a deps file
      - name: Install ruff
        run: python -m pip install --upgrade pip ruff

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .
